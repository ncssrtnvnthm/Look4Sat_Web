<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Satellite body -->
  <rect x="156" y="220" width="120" height="72" rx="12" fill="#7b9fd4" stroke="#4fc3f7" stroke-width="3"/>
  <!-- Solar panels -->
  <rect x="276" y="200" width="100" height="14" rx="4" fill="#4fc3f7" opacity="0.8"/>
  <rect x="276" y="298" width="100" height="14" rx="4" fill="#4fc3f7" opacity="0.8"/>
  <!-- Antenna -->
  <line x1="216" y1="220" x2="216" y2="172" stroke="#e0e0e0" stroke-width="4" stroke-linecap="round"/>
  <circle cx="216" cy="168" r="6" fill="#ffb74d"/>
  <!-- Orbit ring -->
  <ellipse cx="256" cy="256" rx="220" ry="60" fill="none" stroke="#4fc3f7" stroke-width="2" stroke-dasharray="8 8" opacity="0.3" transform="rotate(-25 256 256)"/>
  <!-- Ground station dot -->
  <circle cx="256" cy="380" r="8" fill="#66bb6a"/>
  <line x1="256" y1="372" x2="256" y2="352" stroke="#66bb6a" stroke-width="2"/>
  <!-- Signal waves -->
  <path d="M240 356 Q256 336 272 356" fill="none" stroke="#66bb6a" stroke-width="2" opacity="0.6"/>
  <path d="M232 348 Q256 320 280 348" fill="none" stroke="#66bb6a" stroke-width="2" opacity="0.4"/>
  <path d="M224 340 Q256 304 288 340" fill="none" stroke="#66bb6a" stroke-width="2" opacity="0.2"/>
</svg>
